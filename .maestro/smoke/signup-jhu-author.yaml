# Signs up a Nursing user who intends to publish plans with Johns Hopkins School of Nursing.
#
# One-off simulator fixture for this run:
# - qa-jhu-author-202606071600@betterat.app / BetterAtQA2026f7K2
appId: com.betterat.app
tags:
  - smoke
  - signup
  - organization
  - blueprint
---

- launchApp:
    clearState: true

- tapOn:
    text: "OK"
    optional: true

- extendedWaitUntil:
    visible: ".*"
    timeout: 15000

- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn:
          point: "50%,22%"
          optional: true

- runFlow:
    when:
      visible: "Enter URL manually"
    commands:
      - tapOn: "Enter URL manually"
      - inputText: "http://localhost:8082"
      - pressKey: Enter
      - tapOn:
          text: "Connect"
          optional: true
      - tapOn:
          text: "Go"
          optional: true

- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- tapOn:
    id: "xmark"
    optional: true
- tapOn:
    point: "91%,47%"
    optional: true

- openLink: "betterat://signup"
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Close"
    optional: true
- tapOn:
    point: "91%,47%"
    optional: true
- openLink: "betterat://signup"

- extendedWaitUntil:
    visible:
      id: "signup-title"
    timeout: 120000

- tapOn:
    id: "signup-back-to-interests"
    optional: true

- extendedWaitUntil:
    visible:
      id: "signup-interest-nursing"
    timeout: 30000

- tapOn:
    id: "signup-interest-nursing"
- tapOn:
    text: "Select Nursing"
    optional: true
- extendedWaitUntil:
    visible:
      id: "signup-name-input"
    timeout: 30000

- assertVisible: "Nursing"

- tapOn:
    id: "signup-name-input"
- eraseText
- inputText: "QA JHU Author"
- hideKeyboard

- tapOn:
    id: "signup-email-input"
- eraseText
- inputText: "qa-jhu-author-202606071600@betterat.app"
- hideKeyboard

- tapOn:
    id: "signup-password-toggle"
- tapOn:
    id: "signup-password-input"
- eraseText
- inputText: "BetterAtQA2026f7K2"
- hideKeyboard

- scrollUntilVisible:
    element:
      id: "signup-submit-button"
    direction: DOWN
    timeout: 15000

- tapOn:
    id: "signup-submit-button"

- extendedWaitUntil:
    visible:
      id: "trial-activation-start"
    timeout: 60000
