# Sign In Flow Test
# Tests sign in through Account modal using stable testIDs
appId: com.betterat.app
tags:
  - auth
  - critical
env:
  TEST_EMAIL: "demo-sailor@regattaflow.app"
  TEST_PASSWORD: ${DEMO_PASSWORD}
---

# Launch the app
- launchApp

# Wait for app to load
- extendedWaitUntil:
    visible: ".*"
    timeout: 15000

# Handle Expo dev launcher (dynamic host/port variants)
- tapOn:
    text: "BetterAt"
    optional: true
- tapOn:
    text: "http://10.0.2.2:8082"
    optional: true
- tapOn:
    text: "http://10.0.2.2:8081"
    optional: true
- tapOn:
    text: "http://localhost:8081"
    optional: true

# Wait for app to fully load
- extendedWaitUntil:
    visible: ".*"
    timeout: 20000

# Handle onboarding screens if they appear
- repeat:
    times: 8
    commands:
      - tapOn:
          text: "Continue"
          optional: true
      - tapOn:
          text: "Get Started"
          optional: true
      - tapOn:
          text: "Next"
          optional: true
      - tapOn:
          text: "Skip"
          optional: true

# Wait for UI to stabilize
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000

# ============================================================
# PRECONDITION: ensure a signed-out start state.
# On a hot sim the user may already be signed in. Detect by
# checking for the main app shell (Practice tab) and sign out first
# so the rest of the flow runs from a known state.
# ============================================================
- runFlow:
    when:
      visible:
        id: "tab-races"
    commands:
      - openLink: "betterat://account"
      - extendedWaitUntil:
          visible: "Account"
          timeout: 5000
      - scroll
      - scroll
      - extendedWaitUntil:
          visible:
            id: "account-sign-out-button"
          timeout: 5000
      - tapOn:
          id: "account-sign-out-button"
      - extendedWaitUntil:
          visible: "Cancel"
          timeout: 5000
      - tapOn:
          text: "Sign Out"
          index: 1
      - extendedWaitUntil:
          visible: "Log in"
          timeout: 15000

# Navigate directly to Login
- openLink: "betterat://login"
- extendedWaitUntil:
    visible:
      id: "login-title"
    timeout: 20000
- assertVisible:
    id: "login-title"

# ============================================================
# CREDENTIAL ENTRY
# Note: TextInput testID selectors don't work reliably on iOS.
# Using coordinate-based input as fallback.
# ============================================================

# Enter email
- tapOn:
    point: "50%,62%"
- eraseText
- inputText: ${TEST_EMAIL}

# Hide keyboard for consistent positioning
- hideKeyboard

# Enter password
- tapOn:
    point: "50%,69%"
- eraseText
- inputText: ${TEST_PASSWORD}

# Hide keyboard
- hideKeyboard

# Tap Sign In button
- tapOn:
    id: "login-submit-button"

# ============================================================
# VERIFY SIGN IN SUCCESS
# ============================================================

# Wait for app to process login
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# Wait for main app screen to appear after sign-in
- extendedWaitUntil:
    visible:
      id: "tab-races"
    timeout: 60000

- assertVisible:
    id: "tab-races"
